name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write     # required for OIDC token (provenance attestation)
  attestations: write # required to write attestation to GitHub

jobs:
  release-binaries:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0  # Fetch all history for accurate changelog generation

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.25.x'

      - name: Make release binaries
        run: |
          VERSION=${GITHUB_REF##*/}  # extract tag like v0.1.0 or branch name
          echo "Using version: $VERSION"
          make release VERSION=$VERSION

      - name: Attest release binaries
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2.4.0
        with:
          subject-path: 'releases/leafwiki-${{ github.ref_name }}-*'

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_GITHUB_TOKEN }}

      - name: Build & Push Docker image
        run: |
          VERSION=${GITHUB_REF##*/}  # extract v0.1.0
          echo "Building Multi-Arch Docker image with version $VERSION"
          make docker-build-publish VERSION=$VERSION REPO_OWNER=${{ github.repository_owner }}

      - name: Get latest tag before current one
        id: latest
        run: |
          TAGS=$(git tag --sort=-v:refname)
          echo "Available tags: $TAGS"
          CURRENT="${{ github.ref_name }}"
          PREVIOUS=""
          for tag in $TAGS; do
            if [ "$tag" = "$CURRENT" ]; then continue; fi
            PREVIOUS=$tag
            break
          done
          echo "Found previous tag: $PREVIOUS"
          echo "tag=$PREVIOUS" >> $GITHUB_OUTPUT

      - name: Generate categorized changelog
        id: changelog
        run: |
          make changelog PREVIOUS=${{ steps.latest.outputs.tag }} CURRENT=${{ github.ref_name }}
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          cat current_release_changelog.md >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Publish GitHub Release
        # use pinned version because of issue described here:
        # https://github.com/softprops/action-gh-release/issues/628
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631 # v2.2.2
        if: github.ref_type == 'tag'
        with:
          tag_name: ${{ github.ref_name }}
          name: LeafWiki ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.changelog }}
          files: |
            releases/leafwiki-${{ github.ref_name }}-linux-amd64
            releases/leafwiki-${{ github.ref_name }}-linux-amd64.sha256
            releases/leafwiki-${{ github.ref_name }}-linux-arm64
            releases/leafwiki-${{ github.ref_name }}-linux-arm64.sha256
            releases/leafwiki-${{ github.ref_name }}-darwin-amd64
            releases/leafwiki-${{ github.ref_name }}-darwin-amd64.sha256
            releases/leafwiki-${{ github.ref_name }}-darwin-arm64
            releases/leafwiki-${{ github.ref_name }}-darwin-arm64.sha256
            releases/leafwiki-${{ github.ref_name }}-windows-amd64.exe
            releases/leafwiki-${{ github.ref_name }}-windows-amd64.exe.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASES_GITHUB_TOKEN }}
