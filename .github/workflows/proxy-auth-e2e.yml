name: Proxy Auth E2E

on:
  pull_request:
    branches:
      - main
      - release/*
      - releases/*

permissions:
  contents: read

jobs:
  proxy-auth-e2e:
    name: Reverse-Proxy Auth Integration Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.25.x'

      - name: Build LeafWiki Docker image
        run: docker compose -f e2e-proxy/docker-compose.yml build

      - name: Start proxy stack (LeafWiki + nginx)
        run: docker compose -f e2e-proxy/docker-compose.yml up -d --wait
        timeout-minutes: 3

      - name: Run proxy auth E2E tests
        working-directory: e2e-proxy
        run: go test -v -timeout 60s ./...
        env:
          E2E_PROXY_URL: http://localhost:8095

      - name: Print stack logs on failure
        if: failure()
        run: docker compose -f e2e-proxy/docker-compose.yml logs

      - name: Teardown proxy stack
        if: always()
        run: docker compose -f e2e-proxy/docker-compose.yml down --volumes --remove-orphans
