server {
    listen 80;

    location / {
        # Strip any Remote-User header that clients might try to inject directly.
        # We always set it from the X-Test-User header (test harness) so individual
        # tests can control which username is forwarded to LeafWiki.
        # In a real deployment nginx would derive this from its own auth mechanism.
        set $proxy_user $http_x_test_user;
        proxy_set_header Remote-User $proxy_user;

        proxy_pass         http://leafwiki:8080;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;

        # Forward cookies unchanged (needed for CSRF and JWT fallback tests).
        proxy_pass_header  Set-Cookie;
    }
}
